LLMConfig:
  API_KEY: 'API_TOKEN'
  LLM_URL: 'https://chatgpt.com/api/v1'
  MODEL: 'GPT_5'
  MAX_TOOL_CALLS: 10
  MAX_ITERATIONS: 15
  RECURSION_LIMIT: 100
  PROMPT_COST_PER_MILLION: 1.25
  COMPLETION_COST_PER_MILLION: 10.0

llm_review_enabled: false
aggressiveScan: false

vulnerabilityConfig:
   - command_injection
   - code_injection
   - order_scan
   - sqli
   - path_traversal
   - ssrf
   - open_redirect
   - template_injection
   - deserialization
   - cryptographic_failure
   - unsafe_reflection
   - xxe
   - ldap_injection
   - xpath_injection
   - nosql_injection

sources:
  annotations:
    - "@RequestMapping"
    - "@GetMapping"
    - "@PostMapping"
    - "@PutMapping"
    - "@DeleteMapping"
    - "@PatchMapping"
    - "@Path"

vulnerabilityArgs:
  sensitive_logging:
    pii_keywords: ["private", "privateKey", "username", "password"]

tools:
  astrail:
    astrailpath: '/opt/astrail/astrail'
    javasrc2cpg: '/opt/astrail/javasrc2cpg'
    port: 9004

  opengrep:
    path: '/usr/local/bin/opengrep'