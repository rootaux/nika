LLMConfig:
  API_KEY: 'API_TOKEN'
  LLM_URL: 'https://chatgpt.com/api/v1'
  MODEL: 'GPT_5'
  MAX_TOOL_CALLS: 10
  MAX_ITERATIONS: 15
  RECURSION_LIMIT: 100
  PROMPT_COST_PER_MILLION: 1.25
  COMPLETION_COST_PER_MILLION: 10.0
  CACHED_TOKEN_COST_PER_MILLION: 0.125

llm_review_enabled: false
aggressiveScan: false

excludeSourceArgs:
  annotations: []
  types:
    - HttpServletResponse
    - ServletResponse

vulnerabilityConfig:
   - command_injection
   - code_injection
   - order_scan
   - sql_injection
   - path_traversal
   - ssrf
   - open_redirect
   - template_injection
   - deserialization
   - cryptographic_failure
   - unsafe_reflection
   - xxe
   - idor
   - ldap_injection
   - xpath_injection
   - nosql_injection

sources:
  annotations:
    - "@RequestMapping"
    - "@GetMapping"
    - "@PostMapping"
    - "@PutMapping"
    - "@DeleteMapping"
    - "@PatchMapping"
    - "@Path"
  source_methods:
    - "com.example.web.LegacyServlet.handleRequest"

vulnerabilityArgs:
  sensitive_logging:
    pii_keywords: ["private", "privateKey", "username", "password"]
  sql_injection:
    sanitizers: ["encodeForSQL", "escapeSql", "parseInt", "parseLong", "parseShort", "parseByte", "parseDouble", "parseFloat", "parseBoolean"]
  command_injection:
    sanitizers: ["encodeForOS", "parseInt", "parseLong", "parseShort", "parseByte", "parseDouble", "parseFloat", "parseBoolean"]
  path_traversal:
    sanitizers: ["parseInt", "parseLong", "parseShort", "parseByte", "parseDouble", "parseFloat", "parseBoolean"]
  ldap_injection:
    sanitizers: ["encodeForLDAP", "encodeForDN", "parseInt", "parseLong", "parseShort", "parseByte", "parseDouble", "parseFloat", "parseBoolean"]
  xpath_injection:
    sanitizers: ["encodeForXPath", "parseInt", "parseLong", "parseShort", "parseByte", "parseDouble", "parseFloat", "parseBoolean"]
  idor:
    identifier_params:
      - "userId"
      - "accountId"
      - "customerId"
      - "orderId"
      - "memberId"
      - "profileId"
      - "walletId"
      - "documentId"
      - "invoiceId"
      - "resourceId"
    match_generic_id: true
    include_query_params: true
    detect_request_body: true
    request_body_annotations: ["RequestBody"]
    ownership_check_functions:
      - { name: "checkUserOwnership", resource: "userId" }
      - { name: "checkOrderOwnership", repository: "orders-service", resource: "orderId" }
    ownership_check_annotations:
      - "PreAuthorize"
      - "PostAuthorize"
      - "PreFilter"
      - "PostFilter"
      - { name: "OwnsResource", repository: "orders-service", resource: "orderId" }
    auto_detect_ownership: false
    principal_markers:
      - "SecurityContextHolder"
      - "getAuthentication"
      - "getPrincipal"
      - "getCurrentUser"
      - "getCurrentUserId"
      - "currentUser"
      - "loggedInUser"
      - "getUserPrincipal"
      - "getRemoteUser"
    principal_types:
      - "java.security.Principal"
      - "org.springframework.security.core.Authentication"
      - "org.springframework.security.core.userdetails.UserDetails"
    principal_annotations:
      - "AuthenticationPrincipal"
    ownership_requires_identifier_param: true
    require_ownership_comparison: true
    exclude_when_ownership_found: false

tools:
  astrail:
    astrailpath: '/opt/astrail/astrail'
    javasrc2cpg: '/opt/astrail/javasrc2cpg'
    port: 9004

  opengrep:
    path: '/usr/local/bin/opengrep'
