rules:
  - id: java-pebble-ssti-sink
    languages: [java]
    severity: ERROR
    message: "Potential SSTI: Pebble engine getting a template from a non-literal string."
    metadata:
      cwe: "CWE-94"
      technology: [pebble]
    patterns:
      # 1. Restrict $ENGINE to only PebbleEngine types (including legacy and modern package names)
      - pattern-either:
          - pattern: (PebbleEngine $ENGINE).getTemplate(...)
          - pattern: (io.pebbletemplates.pebble.PebbleEngine $ENGINE).getTemplate(...)
          - pattern: (com.mitchellbosecke.pebble.PebbleEngine $ENGINE).getTemplate(...)

      # 2. Look for the dangerous dynamic input sink
      - pattern: $ENGINE.getTemplate($INPUT)

      # 3. Filter out safe, hardcoded strings
      - pattern-not: $ENGINE.getTemplate("...")