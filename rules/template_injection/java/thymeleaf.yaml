rules:
  - id: java-thymeleaf-ssti-sink
    languages: [java]
    severity: ERROR
    message: "Potential SSTI: Thymeleaf or SpEL processing a dynamic template string."
    metadata:
      cwe: "CWE-94"
      technology: [thymeleaf, spring, spel]
    patterns:
      # 1. Look for typed sinks for BOTH Thymeleaf and SpEL
      - pattern-either:
          # --- Thymeleaf Engine Sinks ---
          - pattern: (TemplateEngine $ENGINE).process($INPUT, ...)
          - pattern: (ITemplateEngine $ENGINE).process($INPUT, ...)
          - pattern: (org.thymeleaf.TemplateEngine $ENGINE).process($INPUT, ...)
          - pattern: (org.thymeleaf.ITemplateEngine $ENGINE).process($INPUT, ...)
          
          # --- Spring Expression Language (SpEL) Sinks ---
          - pattern: (ExpressionParser $PARSER).parseExpression($INPUT).getValue(...)
          - pattern: (SpelExpressionParser $PARSER).parseExpression($INPUT).getValue(...)
          - pattern: (org.springframework.expression.ExpressionParser $PARSER).parseExpression($INPUT).getValue(...)
          - pattern: (org.springframework.expression.spel.standard.SpelExpressionParser $PARSER).parseExpression($INPUT).getValue(...)

      # 2. Filter out safe, hardcoded strings
      - pattern-not: $ENGINE.process("...", ...)
      - pattern-not: $PARSER.parseExpression("...").getValue(...)