rules:
- id: hibernate-createquery-direct-concat
  patterns:
  - pattern-either:
    - pattern: $SESSION.createQuery($HQL + $INPUT)
    - pattern: $EM.createQuery($HQL + $INPUT)
    - pattern: $SESSION.createQuery(... + $INPUT + ...)
    - pattern: $EM.createQuery(... + $INPUT + ...)
  - pattern-inside: "$METHOD(...) {\n  ...\n}"
  - pattern-inside: "class $CLASS {\n  ...\n}"
  message: 'Class: $CLASS, Method: $METHOD'
  severity: ERROR
  languages:
  - java
  metadata:
    category: security
    cwe: 'CWE-89: SQL Injection'
    confidence: HIGH
- id: hibernate-createquery-variable-concat
  patterns:
  - pattern-either:
    - pattern: 'String $HQL = ... + $VAR + ...;

        ...

        $SESSION.createQuery($HQL);'
    - pattern: 'String $HQL = ... + $VAR + ...;

        ...

        $EM.createQuery($HQL);'
  - pattern-inside: "$METHOD(...) {\n  ...\n}"
  - pattern-inside: "class $CLASS {\n  ...\n}"
  message: 'Class: $CLASS, Method: $METHOD'
  severity: ERROR
  languages:
  - java
  metadata:
    category: security
    cwe: 'CWE-89: SQL Injection'
    confidence: HIGH
