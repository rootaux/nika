rules:
- id: jooq-fetch-direct-concat
  patterns:
  - pattern-either:
    - pattern: $DSL.fetch($SQL + $INPUT)
    - pattern: $DSL.fetch(... + $INPUT + ...)
  - pattern-inside: "$METHOD(...) {\n  ...\n}"
  - pattern-inside: "class $CLASS {\n  ...\n}"
  message: 'Class: $CLASS, Method: $METHOD'
  severity: ERROR
  languages:
  - java
  metadata:
    category: security
    cwe: 'CWE-89: SQL Injection'
    confidence: HIGH
- id: jooq-fetch-variable-concat
  patterns:
  - pattern: 'String $SQL = ... + $VAR + ...;

      ...

      $DSL.fetch($SQL);'
  - pattern-inside: "$METHOD(...) {\n  ...\n}"
  - pattern-inside: "class $CLASS {\n  ...\n}"
  message: 'Class: $CLASS, Method: $METHOD'
  severity: ERROR
  languages:
  - java
  metadata:
    category: security
    cwe: 'CWE-89: SQL Injection'
    confidence: HIGH
- id: jooq-fetch-string-format
  patterns:
  - pattern: $DSL.fetch(String.format(...))
