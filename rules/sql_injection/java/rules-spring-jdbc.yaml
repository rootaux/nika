rules:
- id: spring-jdbctemplate-query-direct-concat
  patterns:
  - pattern-either:
    - pattern: $TEMPLATE.query($SQL + $INPUT, ...)
    - pattern: $TEMPLATE.query(... + $INPUT + ...)
  - pattern-inside: "$METHOD(...) {\n  ...\n}"
  - pattern-inside: "class $CLASS {\n  ...\n}"
  message: 'Class: $CLASS, Method: $METHOD'
  severity: ERROR
  languages:
  - java
  metadata:
    category: security
    cwe: 'CWE-89: SQL Injection'
    confidence: HIGH
- id: spring-jdbctemplate-query-variable-concat
  patterns:
  - pattern: 'String $SQL = ... + $VAR + ...;

      ...

      $TEMPLATE.query($SQL, ...);'
  - pattern-inside: "$METHOD(...) {\n  ...\n}"
  - pattern-inside: "class $CLASS {\n  ...\n}"
  message: 'Class: $CLASS, Method: $METHOD'
  severity: ERROR
  languages:
  - java
  metadata:
    category: security
    cwe: 'CWE-89: SQL Injection'
    confidence: HIGH
- id: spring-jdbctemplate-query-string-format
  patterns:
  - pattern: $TEMPLATE.query(String.format(...), ...)
