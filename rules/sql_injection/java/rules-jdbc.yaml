rules:
- id: jdbc-executequery-direct-concat
  patterns:
  - pattern-either:
    - pattern: $STMT.executeQuery($SQL + $INPUT)
    - pattern: $STMT.executeQuery($INPUT + $SQL)
    - pattern: $STMT.executeQuery(... + $INPUT + ...)
  - pattern-inside: "$METHOD(...) {\n  ...\n}"
  - pattern-inside: "class $CLASS {\n  ...\n}"
  message: 'Class: $CLASS, Method: $METHOD'
  severity: ERROR
  languages:
  - java
  metadata:
    category: security
    cwe: 'CWE-89: SQL Injection'
    confidence: HIGH
- id: jdbc-executequery-variable-concat
  patterns:
  - pattern: 'String $SQL = ... + $VAR + ...;

      ...

      $STMT.executeQuery($SQL);'
  - pattern-inside: "$METHOD(...) {\n  ...\n}"
  - pattern-inside: "class $CLASS {\n  ...\n}"
  message: 'Class: $CLASS, Method: $METHOD'
  severity: ERROR
  languages:
  - java
  metadata:
    category: security
    cwe: 'CWE-89: SQL Injection'
    confidence: HIGH
