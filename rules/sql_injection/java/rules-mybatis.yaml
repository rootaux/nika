rules:
- id: mybatis-select-dollar-interpolation
  patterns:
  - pattern: '@Select("...$${...}...")'
  - pattern-inside: "interface $CLASS {\n  ...\n}"
  message: 'Class: $CLASS, Method: $METHOD'
  severity: ERROR
  languages:
  - java
  metadata:
    category: security
    cwe: 'CWE-89: SQL Injection'
    confidence: HIGH
