rules:
- id: sql-dynamic-join-direct-concat
  patterns:
  - pattern-either:
    - pattern: $STMT.executeQuery("... JOIN " + $CLAUSE)
    - pattern: $STMT.executeQuery("... INNER JOIN " + $TABLE)
    - pattern: $STMT.executeQuery("... LEFT JOIN " + $TABLE)
    - pattern: $STMT.executeQuery("... RIGHT JOIN " + $TABLE)
  - pattern-inside: "$METHOD(...) {\n  ...\n}"
  - pattern-inside: "class $CLASS {\n  ...\n}"
  message: 'Class: $CLASS, Method: $METHOD'
  severity: ERROR
  languages:
  - java
  metadata:
    category: security
    cwe: 'CWE-89: SQL Injection'
    confidence: HIGH
- id: sql-dynamic-join-variable-concat
  patterns:
  - pattern: 'String $SQL = "... JOIN " + $CLAUSE + ...;

      ...

      $STMT.executeQuery($SQL);'
  - pattern-inside: "$METHOD(...) {\n  ...\n}"
  - pattern-inside: "class $CLASS {\n  ...\n}"
  message: 'Class: $CLASS, Method: $METHOD'
  severity: ERROR
  languages:
  - java
  metadata:
    category: security
    cwe: 'CWE-89: SQL Injection'
    confidence: HIGH
