rules:
- id: dbutils-query-direct-concat
  patterns:
  - pattern-either:
    - pattern: $RUNNER.query($CONN, $SQL + $INPUT, ...)
    - pattern: $RUNNER.query($CONN, ... + $INPUT + ...)
  - pattern-inside: "$METHOD(...) {\n  ...\n}"
  - pattern-inside: "class $CLASS {\n  ...\n}"
  message: 'Class: $CLASS, Method: $METHOD'
  severity: ERROR
  languages:
  - java
  metadata:
    category: security
    cwe: 'CWE-89: SQL Injection'
    confidence: HIGH
- id: dbutils-query-variable-concat
  patterns:
  - pattern: 'String $SQL = ... + $VAR + ...;

      ...

      $RUNNER.query($CONN, $SQL, ...);'
  - pattern-inside: "$METHOD(...) {\n  ...\n}"
  - pattern-inside: "class $CLASS {\n  ...\n}"
  message: 'Class: $CLASS, Method: $METHOD'
  severity: ERROR
  languages:
  - java
  metadata:
    category: security
    cwe: 'CWE-89: SQL Injection'
    confidence: HIGH
- id: dbutils-query-string-format
  patterns:
  - pattern: $RUNNER.query($CONN, String.format(...), ...)
