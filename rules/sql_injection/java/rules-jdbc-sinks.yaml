rules:
- id: jdbc-statement-exec-sink
  patterns:
  - pattern-either:
    - pattern: (java.sql.Statement $STMT).executeQuery($SQL, ...)
    - pattern: (java.sql.Statement $STMT).executeUpdate($SQL, ...)
    - pattern: (java.sql.Statement $STMT).executeLargeUpdate($SQL, ...)
    - pattern: (java.sql.Statement $STMT).execute($SQL, ...)
    - pattern: (java.sql.Statement $STMT).addBatch($SQL, ...)
    - pattern: (java.sql.PreparedStatement $STMT).executeQuery($SQL, ...)
    - pattern: (java.sql.PreparedStatement $STMT).executeUpdate($SQL, ...)
    - pattern: (java.sql.PreparedStatement $STMT).executeLargeUpdate($SQL, ...)
    - pattern: (java.sql.PreparedStatement $STMT).execute($SQL, ...)
    - pattern: (java.sql.PreparedStatement $STMT).addBatch($SQL, ...)
    - pattern: (java.sql.CallableStatement $STMT).executeQuery($SQL, ...)
    - pattern: (java.sql.CallableStatement $STMT).executeUpdate($SQL, ...)
    - pattern: (java.sql.CallableStatement $STMT).executeLargeUpdate($SQL, ...)
    - pattern: (java.sql.CallableStatement $STMT).execute($SQL, ...)
    - pattern: (java.sql.CallableStatement $STMT).addBatch($SQL, ...)
  - pattern-not: $STMT.$M("...", ...)
  - pattern-not: $STMT.$M("...")
  - pattern-inside: "$METHOD(...) {\n  ...\n}"
  - pattern-inside: "class $CLASS {\n  ...\n}"
  message: 'Class: $CLASS, Method: $METHOD'
  severity: ERROR
  languages: [java]
  metadata:
    category: security
    cwe: 'CWE-89: SQL Injection'
    confidence: MEDIUM
    sink_kind: sql
    typed_sink: true
