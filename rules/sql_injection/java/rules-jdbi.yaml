rules:
- id: jdbi-createquery-direct-concat
  patterns:
  - pattern-either:
    - pattern: $HANDLE.createQuery($SQL + $INPUT)
    - pattern: $HANDLE.createQuery(... + $INPUT + ...)
  - pattern-inside: "$METHOD(...) {\n  ...\n}"
  - pattern-inside: "class $CLASS {\n  ...\n}"
  message: 'Class: $CLASS, Method: $METHOD'
  severity: ERROR
  languages:
  - java
  metadata:
    category: security
    cwe: 'CWE-89: SQL Injection'
    confidence: HIGH
- id: jdbi-createquery-variable-concat
  patterns:
  - pattern: 'String $SQL = ... + $VAR + ...;

      ...

      $HANDLE.createQuery($SQL);'
  - pattern-inside: "$METHOD(...) {\n  ...\n}"
  - pattern-inside: "class $CLASS {\n  ...\n}"
  message: 'Class: $CLASS, Method: $METHOD'
  severity: ERROR
  languages:
  - java
  metadata:
    category: security
    cwe: 'CWE-89: SQL Injection'
    confidence: HIGH
