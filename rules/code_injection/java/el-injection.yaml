rules:
- id: el-injection
  metadata:
    cwe:
    - "CWE-94: Improper Control of Generation of Code ('Code Injection')"
    owasp:
    - A03:2021 - Injection
    - A05:2025 - Injection
    source-rule-url: https://find-sec-bugs.github.io/bugs.htm#EL_INJECTION
    category: security
    technology:
    - java
    references:
    - https://owasp.org/Top10/A03_2021-Injection
    cwe2022-top25: true
    subcategory:
    - audit
    likelihood: LOW
    impact: HIGH
    confidence: LOW
  message: >-
    An expression is built with a dynamic value. The source of the value(s) should
    be verified to avoid that unfiltered values fall into this risky code evaluation.
  severity: WARNING
  languages: [java]
  patterns:
  - pattern-either:
    - pattern: $EF.createValueExpression($CTX, $INPUT, ...)
    - pattern: $EF.createMethodExpression($CTX, $INPUT, ...)
    - pattern: $OBJECT.buildConstraintViolationWithTemplate($INPUT, ...)
  # Constrain the receivers to the known EL / validation types
  - metavariable-type:
      metavariable: $EF
      types:
        - ExpressionFactory
        - javax.el.ExpressionFactory
        - jakarta.el.ExpressionFactory
  - metavariable-type:
      metavariable: $OBJECT
      types:
        - ConstraintValidatorContext
        - javax.validation.ConstraintValidatorContext
        - jakarta.validation.ConstraintValidatorContext
  # Filter out safe, hardcoded expressions
  - pattern-not: $EF.createValueExpression($CTX, "...", ...)
  - pattern-not: $EF.createMethodExpression($CTX, "...", ...)
  - pattern-not: $OBJECT.buildConstraintViolationWithTemplate("...", ...)
