rules:
- id: ognl-injection
  message: >-
    A expression is built with a dynamic value. The source of the value(s) should
    be verified to avoid that unfiltered values fall into this risky code evaluation.
  metadata:
    cwe:
    - "CWE-94: Improper Control of Generation of Code ('Code Injection')"
    owasp:
    - A03:2021 - Injection
    - A05:2025 - Injection
    source-rule-url: https://find-sec-bugs.github.io/bugs.htm#OGNL_INJECTION
    category: security
    technology:
    - ognl
    references:
    - https://owasp.org/Top10/A03_2021-Injection
    cwe2022-top25: true
    subcategory:
    - audit
    likelihood: LOW
    impact: MEDIUM
    confidence: LOW
  severity: WARNING
  languages: [java]
  patterns:
  - pattern-either:
    - pattern: $P.getGetMethod($T, $INPUT, ...)
    - pattern: $P.getSetMethod($T, $INPUT, ...)
    - pattern: $P.getField($T, $INPUT, ...)
    - pattern: $P.setProperties($INPUT, ...)
    - pattern: $P.setProperty($INPUT, ...)
    - pattern: $P.getValue($INPUT, ...)
    - pattern: $P.setValue($INPUT, ...)
    - pattern: $P.translateVariables($INPUT, ...)
    - pattern: $P.translateVariablesCollection($INPUT, ...)
    - pattern: $P.shallBeIncluded($INPUT, ...)
    - pattern: $P.commaDelimitedStringToSet($INPUT, ...)
    - pattern: $P.evaluate($INPUT, ...)
    - pattern: $P.callMethod($INPUT, ...)
    - pattern: $P.compile($INPUT, ...)
    - pattern: $P.isTrue($INPUT, ...)
    - pattern: $P.findString($INPUT, ...)
    - pattern: $P.findValue($INPUT, ...)
    - pattern: $P.getText($INPUT, ...)
    - pattern: $P.makeSelectList($INPUT, ...)
    - pattern: $P.setParameter($INPUT, ...)
  - metavariable-type:
      metavariable: $P
      types:
        - OgnlReflectionProvider
        - ReflectionProvider
        - TextParseUtil
        - TextParser
        - OgnlTextParser
        - OgnlUtil
        - VelocityStrutsUtil
        - StrutsUtil
        - OgnlTool
        - ValueStack
  # Filter out safe, hardcoded expressions
  - pattern-not: $P.getGetMethod($T, "...", ...)
  - pattern-not: $P.getSetMethod($T, "...", ...)
  - pattern-not: $P.getField($T, "...", ...)
  - pattern-not: $P.setProperties("...", ...)
  - pattern-not: $P.setProperty("...", ...)
  - pattern-not: $P.getValue("...", ...)
  - pattern-not: $P.setValue("...", ...)
  - pattern-not: $P.translateVariables("...", ...)
  - pattern-not: $P.translateVariablesCollection("...", ...)
  - pattern-not: $P.shallBeIncluded("...", ...)
  - pattern-not: $P.commaDelimitedStringToSet("...", ...)
  - pattern-not: $P.evaluate("...", ...)
  - pattern-not: $P.callMethod("...", ...)
  - pattern-not: $P.compile("...", ...)
  - pattern-not: $P.isTrue("...", ...)
  - pattern-not: $P.findString("...", ...)
  - pattern-not: $P.findValue("...", ...)
  - pattern-not: $P.getText("...", ...)
  - pattern-not: $P.makeSelectList("...", ...)
  - pattern-not: $P.setParameter("...", ...)
