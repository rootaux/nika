rules:
  - id: java-mvel-expression-injection
    languages:
      - java
    severity: ERROR
    message: >-
      Potential Command Injection via MVEL expressions.
    patterns:
      - pattern: $MVEL.executeExpression(...)
      - metavariable-type:
          metavariable: $MVEL
          types:
            - MVEL
            - org.mvel2.MVEL