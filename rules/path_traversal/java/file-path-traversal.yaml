rules:
  - id: tainted-file-path
    languages:
      - java
    severity: ERROR
    message: >-
      Path traversal.
    
    # usage: Use pattern-either to match ANY of these lines
    pattern-either:
      - pattern: new File(...)
      - pattern: new java.io.File(...)
      - pattern: new FileReader(...)
      - pattern: new java.io.FileReader(...)
      - pattern: new FileInputStream(...)
      - pattern: new java.io.FileInputStream(...)
      - pattern: java.nio.file.Paths.get(...)
      - pattern: new org.springframework.core.io.ClassPathResource(...)
      - pattern: org.springframework.util.ResourceUtils.getFile(...)
      - pattern: new FileOutputStream(...)
      - pattern: new java.io.FileOutputStream(...)
      - pattern: new javax.xml.transform.stream.StreamSource(...)
      - pattern: org.apache.commons.io.FileUtils.openOutputStream(...)