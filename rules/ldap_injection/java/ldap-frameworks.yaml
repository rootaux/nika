rules:
  - id: java-ldap-injection-sinks-libraries
    message: >-
      Potentially unsafe LDAP search detected via an additional LDAP client library.
      This sink could allow LDAP injection (CWE-90) if a user-controlled filter or
      distinguished name reaches it without escaping or parameterization.
    severity: HIGH
    metadata:
      category: security
      cwe: "CWE-90: Improper Neutralization of Special Elements used in an LDAP Query ('LDAP Injection')"
      technology:
        - java
        - jersey
        - dropwizard
        - spring-security
      subcategory:
        - vuln
      confidence: HIGH
      library_group: "ldap"
    languages:
      - java
    mode: taint

    pattern-sources:
      - pattern: $ANYTHING

    pattern-sinks:
      - pattern-either:
          # ========================================
          # JNDI LdapContext (explicit LDAP-specialised context)
          # ========================================
          - pattern: (javax.naming.ldap.LdapContext $CTX).search($BASE, $FILTER, ...)
          - pattern: (jakarta.naming.ldap.LdapContext $CTX).search($BASE, $FILTER, ...)

          # ========================================
          # Apache Directory LDAP API (org.apache.directory)
          # ========================================
          - pattern: (org.apache.directory.ldap.client.api.LdapConnection $CONN).search($BASE, $FILTER, ...)
          - pattern: (org.apache.directory.ldap.client.api.LdapConnection $CONN).searchAsync($BASE, $FILTER, ...)

          # ========================================
          # Spring Security LDAP
          # ========================================
          # FilterBasedLdapUserSearch(searchBase, searchFilter, contextSource)
          - pattern: new org.springframework.security.ldap.search.FilterBasedLdapUserSearch($BASE, $FILTER, ...)
          - pattern: (org.springframework.security.ldap.SpringSecurityLdapTemplate $T).search($BASE, $FILTER, ...)
          - pattern: (org.springframework.security.ldap.SpringSecurityLdapTemplate $T).searchForSingleEntry($BASE, $FILTER, ...)

          # ========================================
          # Novell / JLDAP (com.novell.ldap) - filter is the 3rd argument
          # ========================================
          - pattern: (com.novell.ldap.LDAPConnection $CONN).search($BASE, $SCOPE, $FILTER, ...)
