rules:
  - id: xxe-sink-xstream-fromxml
    patterns:
      - pattern: $XSTREAM.fromXML(...)
      - metavariable-type:
          metavariable: $XSTREAM
          types:
            - com.thoughtworks.xstream.XStream
    message: "XXE sink: XStream.fromXML() can process external entities"
    languages: [java]
    severity: WARNING
    metadata:
      category: security
      cwe: "CWE-611"
