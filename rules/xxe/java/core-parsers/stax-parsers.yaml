rules:
  - id: xxe-sink-xmlinputfactory-createxmlstreamreader
    patterns:
      - pattern: $FACTORY.createXMLStreamReader(...)
      - metavariable-type:
          metavariable: $FACTORY
          types:
            - javax.xml.stream.XMLInputFactory
    message: "XXE sink: XMLInputFactory.createXMLStreamReader() can process external entities"
    languages: [java]
    severity: WARNING
    metadata:
      category: security
      cwe: "CWE-611"

